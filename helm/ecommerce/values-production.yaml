# Production values for ArgoCD deployment
# This file contains production-ready configurations

# Global settings
global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: "gp3"  # AWS EBS, change for your cloud provider

# PostgreSQL Databases - Production settings
postgresql:
  enabled: true
  user:
    database: users_db
    username: ecommerce_user
    password: "CHANGE_THIS_STRONG_PASSWORD"
  product:
    database: products_db
    username: ecommerce_user
    password: "CHANGE_THIS_STRONG_PASSWORD"
  order:
    database: orders_db
    username: ecommerce_user
    password: "CHANGE_THIS_STRONG_PASSWORD"
  vector:
    database: chatbot_db
    username: ecommerce_user
    password: "CHANGE_THIS_STRONG_PASSWORD"

# Redis - Production settings
redis:
  enabled: true
  password: "CHANGE_THIS_STRONG_REDIS_PASSWORD"
  persistence:
    enabled: true
    size: 8Gi

# Elasticsearch - Production settings
elasticsearch:
  enabled: true
  replicas: 3
  persistence:
    enabled: true
    size: 50Gi

# Kafka - Production settings
kafka:
  enabled: true
  replicas: 3
  zookeeper:
    replicas: 3
  persistence:
    enabled: true
    size: 20Gi

# Services - Production resources
userService:
  image:
    repository: bassembenabbes/ecommerce-user-service
    tag: latest
  replicas: 3
  port: 8001
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

productService:
  image:
    repository: bassembenabbes/ecommerce-product-service
    tag: latest
  replicas: 3
  port: 8002
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

orderService:
  image:
    repository: bassembenabbes/ecommerce-order-service
    tag: latest
  replicas: 3
  port: 8003
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

chatbotService:
  image:
    repository: bassembenabbes/ecommerce-chatbot-service
    tag: latest
  replicas: 2
  port: 8005
  geminiApiKey: "CHANGE_THIS_TO_YOUR_GEMINI_API_KEY"
  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

apiGateway:
  image:
    repository: bassembenabbes/ecommerce-api-gateway
    tag: latest
  replicas: 3
  port: 8000
  resources:
    requests:
      memory: "256Mi"
      cpu: "200m"
    limits:
      memory: "512Mi"
      cpu: "400m"

frontend:
  image:
    repository: bassembenabbes/ecommerce-frontend
    tag: latest
  replicas: 3
  port: 80
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

notificationService:
  image:
    repository: bassembenabbes/ecommerce-notification-service
    tag: latest
  replicas: 2
  port: 8004
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

# Ingress - Production settings
ingress:
  enabled: true
  className: nginx
  hosts:
    - host: ecommerce.yourdomain.com  # CHANGE THIS
      paths:
        - path: /
          pathType: Prefix
          service:
            name: frontend
            port: 80
        - path: /api
          pathType: Prefix
          service:
            name: api-gateway
            port: 8000
  tls:
    - secretName: ecommerce-tls
      hosts:
        - ecommerce.yourdomain.com  # CHANGE THIS

# Monitoring - Production settings
prometheus:
  enabled: true
  persistence:
    enabled: true
    size: 20Gi

grafana:
  enabled: true
  adminPassword: "CHANGE_THIS_STRONG_PASSWORD"
  persistence:
    enabled: true
    size: 10Gi

# N8N - Production settings
n8n:
  enabled: true
  image:
    repository: n8nio/n8n
    tag: latest
  port: 5678
  replicas: 1
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"

# ArgoCD - For GitOps
argocd:
  enabled: false  # Set to true if deploying via ArgoCD
