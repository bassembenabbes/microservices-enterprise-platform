{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecommerce.fullname" . }}-postgres-vector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-vector
  template:
    metadata:
      labels:
        app: postgres-vector
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_DB
          value: {{ .Values.postgresql.vector.database }}
        - name: POSTGRES_USER
          value: {{ .Values.postgresql.vector.username }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgresql.vector.password }}
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-vector-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-vector-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-vector
spec:
  ports:
  - port: 5432
  selector:
    app: postgres-vector
{{- end }}
