apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ecommerce.fullname" . }}-secrets
type: Opaque
data:
  # Base64 encoded values
  gemini-api-key: {{ .Values.chatbotService.geminiApiKey | b64enc }}
  db-password: {{ .Values.postgresql.user.password | b64enc }}
  redis-password: {{ .Values.redis.password | b64enc }}
