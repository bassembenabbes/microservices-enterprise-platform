{{- $root := . }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ecommerce.fullname" $ }}-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/use-regex: "true"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service.name "frontend" }}
                name: {{ include "ecommerce.fullname" $ }}-frontend
                {{- else if eq .service.name "api-gateway" }}
                name: {{ include "ecommerce.fullname" $ }}-api-gateway
                {{- else }}
                name: {{ .service.name }}
                {{- end }}
                port:
                  number: {{ .service.port }}
          {{- end }}
          # Additional paths for monitoring and tools
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: {{ include "ecommerce.fullname" $ }}-grafana
                port:
                  number: 80
          - path: /prometheus
            pathType: Prefix
            backend:
              service:
                name: {{ include "ecommerce.fullname" $ }}-prometheus
                port:
                  number: 9090
          - path: /n8n
            pathType: Prefix
            backend:
              service:
                name: {{ include "ecommerce.fullname" $ }}-n8n
                port:
                  number: {{ $root.Values.n8n.port | default 5678 }}
          - path: /kibana
            pathType: Prefix
            backend:
              service:
                name: {{ include "ecommerce.fullname" $ }}-kibana
                port:
                  number: 5601
    {{- end }}
{{- end }}
