apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecommerce.fullname" . }}-order-service
spec:
  replicas: {{ .Values.orderService.replicas }}
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: {{ .Values.global.imageRegistry }}{{ .Values.orderService.image.repository }}:{{ .Values.orderService.image.tag }}
        env:
        - name: DB_HOST
          value: postgres-order
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: {{ .Values.postgresql.order.database }}
        - name: DB_USER
          value: {{ .Values.postgresql.order.username }}
        - name: DB_PASSWORD
          value: {{ .Values.postgresql.order.password }}
        ports:
        - containerPort: {{ .Values.orderService.port }}
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  ports:
  - port: {{ .Values.orderService.port }}
    targetPort: {{ .Values.orderService.port }}
  selector:
    app: order-service
