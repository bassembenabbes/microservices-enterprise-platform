apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecommerce.fullname" . }}-notification-service
spec:
  replicas: {{ .Values.notificationService.replicas }}
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: {{ .Values.global.imageRegistry }}{{ .Values.notificationService.image.repository }}:{{ .Values.notificationService.image.tag }}
        ports:
        - containerPort: {{ .Values.notificationService.port }}
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  ports:
  - port: {{ .Values.notificationService.port }}
    targetPort: {{ .Values.notificationService.port }}
  selector:
    app: notification-service
