server:
  port: 8005
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 30000
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024

spring:
  application:
    name: chatbot-service
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-vector:5432/chatbot_db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      auto-commit: true
  
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        format_sql: true
    show-sql: false
    open-in-view: false
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 60000ms
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

services:
  user:
    url: ${USER_SERVICE_URL:http://user-service:8001}
    timeout: ${SERVICE_TIMEOUT:5000}
  product:
    url: ${PRODUCT_SERVICE_URL:http://product-service:8002}
    timeout: ${SERVICE_TIMEOUT:5000}
  order:
    url: ${ORDER_SERVICE_URL:http://order-service:8003}
    timeout: ${SERVICE_TIMEOUT:5000}

# ⚠️ SÉCURITÉ: Utiliser des variables d'environnement ou des secrets managés
# Exemples: env var, AWS Secrets Manager, HashiCorp Vault, etc.
google:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.5-flash}
    cache-enabled: ${GEMINI_CACHE_ENABLED:true}
    timeout-ms: ${GEMINI_TIMEOUT:10000}

# RAG Configuration
rag:
  enabled: ${RAG_ENABLED:true}
  top-k: ${RAG_TOP_K:3}
  similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.7}

# Chatbot Configuration
chatbot:
  use-gemini: ${USE_GEMINI:true}
  max-session-history: ${MAX_SESSION_HISTORY:50}
  session-timeout-seconds: ${SESSION_TIMEOUT:3600}

# Resilience4j Configuration
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        slow-call-rate-threshold: 50
        slow-call-duration-threshold: 5s
    instances:
      user-service:
        base-config: default
      product-service:
        base-config: default
      order-service:
        base-config: default
  
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1000
        retry-exceptions:
          - java.net.ConnectException
          - java.io.IOException
          - org.springframework.web.client.HttpServerErrorException
    instances:
      user-service:
        base-config: default
      product-service:
        base-config: default
      order-service:
        base-config: default

logging:
  level:
    com.microservices.chatbot: DEBUG
    org.springframework.web.reactive.function.client: WARN
    org.springframework.data: WARN
    org.hibernate: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/chatbot-service.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    
---
# Profile PRODUCTION
spring:
  config:
    activate:
      on-profile: prod
  
  jpa:
    hibernate:
      ddl-auto: validate

logging:
  level:
    com.microservices.chatbot: INFO
    org.springframework: WARN

