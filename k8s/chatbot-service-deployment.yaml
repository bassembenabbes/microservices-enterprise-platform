apiVersion: v1
kind: Namespace
metadata:
  name: microservices
  labels:
    name: microservices

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chatbot-config
  namespace: microservices
data:
  DB_URL: "jdbc:postgresql://postgres:5432/chatbot_db"
  DB_USERNAME: "chatbot_user"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  USER_SERVICE_URL: "http://user-service:8001"
  PRODUCT_SERVICE_URL: "http://product-service:8002"
  ORDER_SERVICE_URL: "http://order-service:8003"
  GEMINI_MODEL: "gemini-2.5-flash"
  RAG_ENABLED: "true"
  RAG_TOP_K: "3"
  USE_GEMINI: "true"
  SPRING_PROFILES_ACTIVE: "prod"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: chatbot-secrets
  namespace: microservices
type: Opaque
stringData:
  gemini-api-key: "CHANGE_ME"  # À remplacer avec la vraie clé
  db-password: "CHANGE_ME"      # À remplacer avec le vrai password

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-service
  namespace: microservices
  labels:
    app: chatbot-service
    version: "1.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  selector:
    matchLabels:
      app: chatbot-service
  
  template:
    metadata:
      labels:
        app: chatbot-service
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8005"
        prometheus.io/path: "/actuator/prometheus"
    
    spec:
      serviceAccountName: chatbot-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      # Pod disruption budget pour high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - chatbot-service
              topologyKey: kubernetes.io/hostname
      
      containers:
      - name: chatbot-service
        image: myregistry.azurecr.io/chatbot-service:1.0.0
        imagePullPolicy: IfNotPresent
        
        ports:
        - name: http
          containerPort: 8005
          protocol: TCP
        
        env:
        # Secrets
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: chatbot-secrets
              key: gemini-api-key
        
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: chatbot-secrets
              key: db-password
        
        # ConfigMap
        - name: DB_URL
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: DB_URL
        
        - name: DB_USERNAME
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: DB_USERNAME
        
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: REDIS_HOST
        
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: REDIS_PORT
        
        - name: USER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: USER_SERVICE_URL
        
        - name: PRODUCT_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: PRODUCT_SERVICE_URL
        
        - name: ORDER_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: ORDER_SERVICE_URL
        
        - name: SPRING_PROFILES_ACTIVE
          valueFrom:
            configMapKeyRef:
              name: chatbot-config
              key: SPRING_PROFILES_ACTIVE
        
        # JVM Options
        - name: JAVA_OPTS
          value: "-XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ParallelRefProcEnabled -Xmx512m -Xms256m -Dfile.encoding=UTF-8"
        
        - name: SERVER_SHUTDOWN
          value: "graceful"
        
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        
        # Startup probe: vérifie que l'app démarre
        startupProbe:
          httpGet:
            path: /api/v1/chatbots/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 10
        
        # Liveness probe: redémarre le pod si mort
        livenessProbe:
          httpGet:
            path: /api/v1/chatbots/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe: retire du service si pas ready
        readinessProbe:
          httpGet:
            path: /api/v1/chatbots/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
        
        volumeMounts:
        - name: logs
          mountPath: /app/logs
        - name: tmp
          mountPath: /tmp
      
      volumes:
      - name: logs
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      
      # Temps grace period pour graceful shutdown
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-service
  namespace: microservices
  labels:
    app: chatbot-service
spec:
  type: ClusterIP
  selector:
    app: chatbot-service
  ports:
  - name: http
    port: 8005
    targetPort: 8005
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: chatbot-service-hpa
  namespace: microservices
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: chatbot-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: chatbot-service-pdb
  namespace: microservices
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: chatbot-service

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chatbot-service
  namespace: microservices

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chatbot-service
  namespace: microservices
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chatbot-service
  namespace: microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: chatbot-service
subjects:
- kind: ServiceAccount
  name: chatbot-service
  namespace: microservices

