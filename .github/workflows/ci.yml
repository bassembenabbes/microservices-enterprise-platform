name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Test Chatbot Service
      run: |
        cd backend/chatbot-service
        mvn clean test

    - name: Test Order Service
      run: |
        cd backend/order-service
        mvn clean test

  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/react-app/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend/react-app
        npm ci

    - name: Run tests
      run: |
        cd frontend/react-app
        npm test -- --coverage --watchAll=false

  build-images:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push User Service
      uses: docker/build-push-action@v5
      with:
        context: ./backend/user-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-user-service:latest

    - name: Build and push Product Service
      uses: docker/build-push-action@v5
      with:
        context: ./backend/product-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-product-service:latest

    - name: Build and push Order Service
      uses: docker/build-push-action@v5
      with:
        context: ./backend/order-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-order-service:latest

    - name: Build and push Chatbot Service
      uses: docker/build-push-action@v5
      with:
        context: ./backend/chatbot-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-chatbot-service:latest

    - name: Build and push API Gateway
      uses: docker/build-push-action@v5
      with:
        context: ./backend/api-gateway
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-api-gateway:latest

    - name: Build and push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest

    - name: Build and push Notification Service
      uses: docker/build-push-action@v5
      with:
        context: ./backend/notification-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-notification-service:latest
