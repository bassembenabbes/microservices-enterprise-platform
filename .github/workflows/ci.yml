name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}

      - name: Test Chatbot Service
        run: |
          cd backend/chatbot-service
          mvn clean test

      - name: Test Order Service
        run: |
          cd backend/order-service
          mvn clean test


  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/react-app/package-lock.json

      - name: Install deps
        run: |
          cd frontend/react-app
          npm ci

      - name: Run tests
        run: |
          cd frontend/react-app
          npm test -- --coverage --watchAll=false


  build-images:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest

    env:
      DOCKER_ENABLED: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ LOGIN DOCKER PROPRE
      - name: Log in to Docker Hub
        if: env.DOCKER_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ======================
      # USER SERVICE
      # ======================
      - name: Build User Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/user-service
          push: ${{ env.DOCKER_ENABLED == 'true' }}
          tags: ${{ env.DOCKER_ENABLED == 'true' && format('{0}/ecommerce-user-service:latest', secrets.DOCKER_USERNAME) || 'ecommerce-user-service:latest' }}

      # ======================
      # PRODUCT SERVICE
      # ======================
      - name: Build Product Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/product-service
          push: ${{ env.DOCKER_ENABLED == 'true' }}
          tags: ${{ env.DOCKER_ENABLED == 'true' && format('{0}/ecommerce-product-service:latest', secrets.DOCKER_USERNAME) || 'ecommerce-product-service:latest' }}

      # ======================
      # ORDER SERVICE
      # ======================
      - name: Build Order Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/order-service
          push: ${{ env.DOCKER_ENABLED == 'true' }}
          tags: ${{ env.DOCKER_ENABLED == 'true' && format('{0}/ecommerce-order-service:latest', secrets.DOCKER_USERNAME) || 'ecommerce-order-service:latest' }}

      # ======================
      # CHATBOT SERVICE
      # ======================
      - name: Build Chatbot Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/chatbot-service
          push: ${{ env.DOCKER_ENABLED == 'true' }}
          tags: ${{ env.DOCKER_ENABLED == 'true' && format('{0}/ecommerce-chatbot-service:latest', secrets.DOCKER_USERNAME) || 'ecommerce-chatbot-service:latest' }}

      # ======================
      # API GATEWAY
      # ======================
      - name: Build API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./backend/api-gateway
          push: ${{ env.DOCKER_ENABLED == 'true' }}
          tags: ${{ env.DOCKER_ENABLED == 'true' && format('{0}/ecommerce-api-gateway:latest', secrets.DOCKER_USERNAME) || 'ecommerce-api-gateway:latest' }}

      # ======================
      # FRONTEND
      # ======================
      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ env.DOCKER_ENABLED == 'true' }}
          tags: ${{ env.DOCKER_ENABLED == 'true' && format('{0}/ecommerce-frontend:latest', secrets.DOCKER_USERNAME) || 'ecommerce-frontend:latest' }}

      # ======================
      # NOTIFICATION SERVICE
      # ======================
      - name: Build Notification Service
        uses: docker/build-push-action@v5
        with:
          context: ./backend/notification-service
          push: ${{ env.DOCKER_ENABLED == 'true' }}
          tags: ${{ env.DOCKER_ENABLED == 'true' && format('{0}/ecommerce-notification-service:latest', secrets.DOCKER_USERNAME) || 'ecommerce-notification-service:latest' }}