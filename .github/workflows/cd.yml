name: CD

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'staging' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ env.ENVIRONMENT }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Install Helm
      uses: azure/setup-helm@v4
      with:
        version: v3.12.0

    - name: Update Helm dependencies
      run: |
        helm dependency update helm/ecommerce

    - name: Deploy to Kubernetes
      run: |
        helm upgrade --install ecommerce-${{ env.ENVIRONMENT }} ./helm/ecommerce \
          --namespace ecommerce-${{ env.ENVIRONMENT }} \
          --create-namespace \
          --set global.imageRegistry=${{ secrets.DOCKER_USERNAME }} \
          --set chatbotService.geminiApiKey=${{ secrets.GEMINI_API_KEY }} \
          --wait

    - name: Verify deployment
      run: |
        kubectl wait --for=condition=available --timeout=300s deployment --all -n ecommerce-${{ env.ENVIRONMENT }}

    - name: Run smoke tests
      run: |
        # Add smoke tests here
        echo "Running smoke tests..."
        # Example: curl -f http://frontend.ecommerce-${{ env.ENVIRONMENT }}.local/health || exit 1

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Notify deployment status
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: "Deployment to ${{ env.ENVIRONMENT }} completed with status: ${{ job.status }}"
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
