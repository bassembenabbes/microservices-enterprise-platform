services:
  # ============================================
  # BASES DE DONNÉES
  # ============================================
  
  postgres-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - microservices-net
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-product:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    networks:
      - microservices-net
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d products_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-order:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    networks:
      - microservices-net
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # CACHE & MESSAGE QUEUE
  # ============================================

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass password
    ports:
      - "6379:6379"
    networks:
      - microservices-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - microservices-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - microservices-net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # SEARCH ENGINE
  # ============================================

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - microservices-net
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kibana:
    image: kibana:8.11.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - microservices-net
    depends_on:
      - elasticsearch
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MICROSERVICES
  # ============================================

  user-service:
    build: ./backend/user-service
    ports:
      - "8001:8001"
    networks:
      - microservices-net
    environment:
      - DATABASE_URL=postgresql://user:password@postgres-user:5432/users_db
      - REDIS_URL=redis://:password@redis:6379
      - JWT_SECRET=my-super-secret-key-change-me
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  product-service:
    build: ./backend/product-service
    ports:
      - "8002:8002"
    networks:
      - microservices-net
    environment:
      - PORT=8002
      - DB_HOST=postgres-product
      - DB_PORT=5432
      - DB_NAME=products_db
      - DB_USER=user
      - DB_PASSWORD=password
      - REDIS_URL=redis://:password@redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      kafka:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  order-service:
    build: ./backend/order-service
    ports:
      - "8003:8003"
    networks:
      - microservices-net
    environment:
      - DATABASE_URL=postgresql://user:password@postgres-order:5432/orders_db
      - REDIS_URL=redis://:password@redis:6379
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      postgres-order:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notification-service:
    build: ./backend/notification-service
    ports:
      - "8004:8004"
    networks:
      - microservices-net
    environment:
      - REDIS_URL=redis://:password@redis:6379
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chatbot-service:
    build: ./backend/chatbot-service
    ports:
      - "8005:8005"
    networks:
      - microservices-net
    environment:
      - REDIS_URL=redis://:password@redis:6379
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # API GATEWAY
  # ============================================

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8000:8000"
    networks:
      - microservices-net
    environment:
      - USER_SERVICE_URL=http://user-service:8001
      - PRODUCT_SERVICE_URL=http://product-service:8002
      - ORDER_SERVICE_URL=http://order-service:8003
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
      - CHATBOT_SERVICE_URL=http://chatbot-service:8005
    depends_on:
      - user-service
      - product-service
      - order-service
      - notification-service
      - chatbot-service
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # FRONTEND
  # ============================================

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - microservices-net
    depends_on:
      - api-gateway
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MONITORING (Optionnel)
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    networks:
      - microservices-net
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    networks:
      - microservices-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

# ============================================
# RÉSEAUX
# ============================================

networks:
  microservices-net:
    driver: bridge
    name: microservices-net

# ============================================
# VOLUMES PERSISTANTS
# ============================================

volumes:
  postgres-user-data:
    name: microservices_postgres_user_data
    external: false
  postgres-product-data:
    name: microservices_postgres_product_data
    external: false
  postgres-order-data:
    name: microservices_postgres_order_data
    external: false
  redis-data:
    name: microservices_redis_data
    external: false
  elasticsearch-data:
    name: microservices_elasticsearch_data
    external: false
  prometheus-data:
    name: microservices_prometheus_data
    external: false
  grafana-data:
    name: microservices_grafana_data
    external: false
