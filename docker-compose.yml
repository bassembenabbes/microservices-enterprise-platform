services:
  # ============================================
  # BASES DE DONNÉES
  # ============================================
  
  postgres-user:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    networks:
      - microservices-net
    volumes:
      - postgres-user-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d users_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-product:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: products_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    networks:
      - microservices-net
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d products_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres-order:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    networks:
      - microservices-net
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d orders_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # CACHE
  # ============================================

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass password
    ports:
      - "6379:6379"
    networks:
      - microservices-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # SEARCH ENGINE
  # ============================================

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - microservices-net
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kibana:
    image: kibana:8.11.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    networks:
      - microservices-net
    depends_on:
      - elasticsearch
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MICROSERVICES
  # ============================================

  user-service:
    build: ./backend/user-service
    ports:
      - "8001:8001"
    networks:
      - microservices-net
    environment:
      - DATABASE_URL=postgresql://user:password@postgres-user:5432/users_db
      - REDIS_URL=redis://:password@redis:6379
      - JWT_SECRET=my-super-secret-key-change-me
    depends_on:
      postgres-user:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  product-service:
    build: ./backend/product-service
    ports:
      - "8002:8002"
    networks:
      - microservices-net
    environment:
      - PORT=8002
      - DB_HOST=postgres-product
      - DB_PORT=5432
      - DB_NAME=products_db
      - DB_USER=user
      - DB_PASSWORD=password
      - REDIS_URL=redis://:password@redis:6379
      - ELASTICSEARCH_URL=http://elasticsearch:9200
    depends_on:
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  order-service:
    build: ./backend/order-service
    ports:
      - "8003:8003"
    networks:
      - microservices-net
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-order:5432/orders_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - REDIS_URL=redis://:password@redis:6379
    depends_on:
      postgres-order:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  notification-service:
    build: ./backend/notification-service
    ports:
      - "8009:8004"
    networks:
      - microservices-net
    environment:
      - REDIS_URL=redis://:password@redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # API GATEWAY
  # ============================================

  api-gateway:
    build: ./backend/api-gateway
    ports:
      - "8000:8000"
    networks:
      - microservices-net
    environment:
      - USER_SERVICE_URL=http://user-service:8001
      - PRODUCT_SERVICE_URL=http://product-service:8002
      - ORDER_SERVICE_URL=http://order-service:8003
    depends_on:
      - user-service
      - product-service
      - order-service
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # FRONTEND
  # ============================================

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    networks:
      - microservices-net
    depends_on:
      - api-gateway
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # MONITORING (Optionnel)
  # ============================================

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    networks:
      - microservices-net
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    networks:
      - microservices-net
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles:
      - monitoring

  # PostgreSQL avec PGVector pour RAG
  postgres-vector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chatbot_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5435:5432"
    networks:
      - microservices-net
    volumes:
      - postgres-vector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d chatbot_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # n8n pour les workflows
  n8n:
    image: n8nio/n8n:latest
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678
      - N8N_USER_FOLDER=/home/node/.n8n
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
    ports:
      - "5678:5678"
    networks:
      - microservices-net
    volumes:
      - n8n-data:/home/node/.n8n
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  chatbot-service:
    build: ./backend/chatbot-service
    ports:
      - "8005:8005"
    networks:
      - microservices-net
    env_file:
      - .env  # ← Charge toutes les variables du fichier .env
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-vector:5432/chatbot_db
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=password
      - GOOGLE_GEMINI_API_KEY=AIzaSyD3QdPN0H2PsA_jz-t8yTlXF5wbYaUszFI
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook
      - JAVA_OPTS=-Xms512m -Xmx1024m
    depends_on:
      postgres-vector:
        condition: service_healthy
      n8n:
        condition: service_started
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============================================
# RÉSEAUX
# ============================================

networks:
  microservices-net:
    driver: bridge
    name: microservices-net

# ============================================
# VOLUMES PERSISTANTS
# ============================================

volumes:
  postgres-user-data:
    name: microservices_postgres_user_data
    external: false
  postgres-product-data:
    name: microservices_postgres_product_data
    external: false
  postgres-order-data:
    name: microservices_postgres_order_data
    external: false
  redis-data:
    name: microservices_redis_data
    external: false
  elasticsearch-data:
    name: microservices_elasticsearch_data
    external: false
  prometheus-data:
    name: microservices_prometheus_data
    external: false
  grafana-data:
    name: microservices_grafana_data
    external: false
  postgres-vector-data:
    name: microservices_postgres_vector_data
    external: false
  n8n-data:
    name: microservices_n8n_data
    external: false
